site_name: metacsp
site_description: >-
  Python port of the Meta-CSP Framework — meta-CSP based hybrid temporal,
  spatial, and resource constraint reasoning.
repo_url: https://github.com/jack-mcmurdo/metacsp
repo_name: jack-mcmurdo/metacsp

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle: { icon: material/brightness-7, name: Dark mode }
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle: { icon: material/brightness-4, name: Light mode }
  features:
    - navigation.sections
    - navigation.top
    - content.code.copy

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            docstring_style: google
            members_order: source
            show_root_heading: false
            show_source: true
            separate_signature: true
            show_signature_annotations: true
            merge_init_into_class: true
            inherited_members: false
            filters: ["!^_"]

markdown_extensions:
  - admonition
  - pymdownx.superfences
  - pymdownx.highlight
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Concepts:
      - concepts/constraint-networks.md
      - concepts/meta-csp-architecture.md
      - concepts/temporal-reasoning.md
      - concepts/allen-interval-algebra.md
      - concepts/activities-and-timelines.md
      - concepts/scheduling-and-planning.md
      - concepts/spatial-reasoning.md
      - concepts/trajectory-envelopes.md
      - concepts/sensing-and-dispatching.md
  - API Reference:
      - Core framework:
          - api/exceptions.md
          - api/utility.md
          - api/framework.md
          - api/framework.multi.md
          - api/framework.meta.md
      - Temporal:
