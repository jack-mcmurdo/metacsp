          - api/time.qualitative.md
          - api/multi.allen_interval.md
          - api/multi.activity.md
          - api/multi.tcsp.md
          - api/fuzzy_allen_interval.md
          - api/multi.fuzzy_activity.md
          - api/multi.fuzzy_set_activity.md
      - Symbols & SAT:
          - api/multi.symbols.md
          - api/boolean_sat.md
          - api/fuzzy_symbols.md
      - Spatial:
          - api/spatial.geometry.md
          - api/spatial.rcc.md
          - api/spatial.cardinal.md
          - api/spatial.reachability.md
          - api/spatial.utility.md
          - api/multi.spatial.de9im.md
          - api/multi.spatial.rectangle_algebra.md
          - api/multi.spatial.block_algebra.md
          - api/multi.temporal_rectangle_algebra.md
      - Spatio-temporal:
